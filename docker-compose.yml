# 开发环境使用本地 PostgreSQL (端口 5433) 和本地 Redis (端口 6379)
# 生产环境可使用 Docker 容器部署

services:
  # PostgreSQL (生产用)
  postgres:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ptidle
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password

  # Redis (生产用)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
